<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<title>NAEC</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="page3">

<h1>საერთო სამაგისტრო გამოცდა</h1>

<div class="container">
<div class="box">
<div class="grid">

<div class="left">
<p>მოგესალმებით...</p>
</div>

<div class="form-box">
<div class="form-inner">

<div class="form-header">სისტემაში შესვლა</div>

<div class="form-body">

<label>პირადი ნომერი</label>
<input id="pid" type="text">

<div class="captcha-box">
<canvas id="captchaCanvas"></canvas>
</div>

<div class="refresh" onclick="generateCaptcha()">განახლება</div>

<input id="captchaInput" type="text">

<label>კოდი</label>
<input id="code" type="text">

<button onclick="login()">გაგრძელება</button>

<div id="error"></div>

</div>
</div>
</div>

</div>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
