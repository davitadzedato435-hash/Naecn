<div class="page-wrapper">
    <h1 class="main-title">საერთო სამაგისტრო გამოცდა</h1>
    
    <div class="container">
        <div class="content-layout">

            <!-- Left -->
            <section class="info-section">
                <p>მოგესალმებით,</p>
                <p>უმაღლესი განათლების სისტემის რეფორმის ფარგლებში, სახელმწიფო უნივერსიტეტებში სწავლა სრულად ფინანსდება სახელმწიფოს მიერ!</p>
                <p><strong>საერთო სამაგისტრო გამოცდაზე რეგისტრაცია მიმდინარეობს.</strong></p>
            </section>

            <!-- Right -->
            <section class="form-section">
                <div class="login-card">

                    <div class="login-header">სისტემაში შესვლა</div>

                    <div class="login-inner-border">
                        <p class="form-instruction">
                            შეიყვანეთ მონაცემები
                        </p>

                        <!-- პირადი ნომერი -->
                        <div class="form-group">
                            <label for="personal-id">პირადი ნომერი</label>
                            <input type="text" id="personal-id">
                        </div>

                        <!-- ✅ დამატებული: საიდენტიფიკაციო კოდი -->
                        <div class="form-group">
                            <label for="identification-code">საიდენტიფიკაციო კოდი</label>
                            <input type="text" id="identification-code">
                        </div>

                        <!-- CAPTCHA -->
                        <div class="captcha-container">
                            <div class="captcha-image">
                                <span class="captcha-text">sx27v</span>
                            </div>
                            <div class="captcha-refresh">
                                <span class="icon">🔄</span> განახლება
                            </div>
                        </div>

                        <!-- captcha input -->
                        <div class="form-group">
                            <label for="captcha-input">აკრიფეთ სიმბოლოები</label>
                            <input type="text" id="captcha-input">
                        </div>

                        <button type="submit" class="submit-btn">
                            გაგრძელება
                        </button>

                    </div>
                </div>
            </section>

        </div>
    </div>
</div>
