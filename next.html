<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>შედეგები</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="wrapper">

        <!-- ლოგო -->
        <div style="text-align:center; margin-bottom:20px;">
            <img src="https://i.imgur.com/nnPWqhV.png" style="width:80px;" alt="logo">
        </div>

        <!-- შედეგების ცხრილი -->
        <div class="table-box">

            <table style="width:100%; background:#fff; border-radius:10px; overflow:hidden;">

                <tr style="background:#1a3d7c; color:white;">
                    <th style="padding:10px;">საგანი</th>
                    <th style="padding:10px;">ქულა</th>
                </tr>

                <tr>
                    <td style="padding:10px;">ლოგიკა</td>
                    <td style="padding:10px;">8.2</td>
                </tr>

                <tr>
                    <td style="padding:10px;">წერა</td>
                    <td style="padding:10px;">12</td>
                </tr>

            </table>

        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
