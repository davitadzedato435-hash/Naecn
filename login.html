<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1 style="text-align:center;">საერთო სამაგისტრო გამოცდა</h1>

    <div class="box">

        <div class="form-box">
            <div class="form-inner">

                <div class="form-header">სისტემაში შესვლა</div>

                <div class="form-body">

                    <input id="code" placeholder="პირადი ნომერი">

                    <div class="captcha">
                        <canvas id="captchaCanvas"></canvas>
                    </div>

                    <input id="captchaInput" placeholder="კოდი">

                    <button onclick="login()">გაგრძელება</button>

                    <div id="error"></div>

                </div>

            </div>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
