<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>საერთო სამაგისტრო გამოცდა</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="page2">

<h2 class="page-title">საერთო სამაგისტრო გამოცდა</h2>

<div class="wrapper">

    <!-- რეგისტრაცია -->
    <div class="row">
        <div class="icon">
            <svg viewBox="0 0 64 64">
                <rect x="8" y="10" width="40" height="30" fill="none" stroke="#b7bcc7" stroke-width="3"/>
                <line x1="15" y1="20" x2="40" y2="20" stroke="#b7bcc7" stroke-width="3"/>
                <line x1="15" y1="28" x2="30" y2="28" stroke="#b7bcc7" stroke-width="3"/>
                <polyline points="18,42 26,50 45,30" fill="none" stroke="#b7bcc7" stroke-width="3"/>
            </svg>
        </div>

        <div class="text">
            <div class="title">რეგისტრაცია</div>
            <div class="desc">
                საერთო სამაგისტრო გამოცდაში მონაწილეობის მისაღებად გაიარეთ რეგისტრაცია და შეავსეთ განაცხადის ფორმა
            </div>
        </div>
    </div>

    <!-- შედეგები -->
    <div class="row" data-link="mag.html">
        <div class="icon">
            <svg viewBox="0 0 64 64">
                <rect x="12" y="8" width="40" height="48" fill="none" stroke="#1f2f6b" stroke-width="3"/>
                <line x1="20" y1="20" x2="45" y2="20" stroke="#1f2f6b" stroke-width="3"/>
                <line x1="20" y1="30" x2="45" y2="30" stroke="#1f2f6b" stroke-width="3"/>
                <line x1="20" y1="40" x2="45" y2="40" stroke="#1f2f6b" stroke-width="3"/>
            </svg>
        </div>

        <div class="text">
            <div class="title">შედეგები</div>
            <div class="desc">
                საერთო სამაგისტრო გამოცდების შედეგების სანახავად გადადით მოცემულ ბმულზე
            </div>
        </div>
    </div>

    <!-- აპელაცია -->
    <div class="row">
        <div class="icon">
            <svg viewBox="0 0 64 64">
                <line x1="32" y1="10" x2="32" y2="50" stroke="#1f2f6b" stroke-width="3"/>
                <line x1="15" y1="25" x2="50" y2="25" stroke="#1f2f6b" stroke-width="3"/>
                <circle cx="20" cy="35" r="6" fill="none" stroke="#1f2f6b" stroke-width="2"/>
                <circle cx="44" cy="35" r="6" fill="none" stroke="#1f2f6b" stroke-width="2"/>
            </svg>
        </div>

        <div class="text">
            <div class="title">აპელაცია</div>
            <div class="desc">
                სააპელაციო განაცხადის გასაგზავნად გამოიყენეთ შესაბამისი გვერდი
            </div>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
