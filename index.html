<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAEC</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <header class="header">
        <img src="https://naec.ge/resources/images/logo.png" class="logo" alt="NAEC Logo">
        <div class="header-text">
            სსიპ შეფასებისა და გამოცდების<br>
            ეროვნული ცენტრი
        </div>
    </header>

    <!-- GRID -->
    <main class="grid">

        <div class="card" data-link="uee.html">
            <img src="https://online.naec.ge/defonline/images/uee1.png" alt="UEE">
        </div>

        <div class="card" data-link="mag.html">
            <img src="https://online.naec.ge/defonline/images/mag1.png" alt="MAG">
        </div>

        <div class="card faded">
            <img src="https://online.naec.ge/defonline/images/teach1.png" alt="Disabled">
        </div>

        <div class="card" data-link="olymp.html">
            <img src="https://online.naec.ge/defonline/images/olimp1.png" alt="Olymp">
        </div>

    </main>

</div>

<!-- JS ბოლოში რომ სწორად ჩაიტვირთოს -->
<script src="script.js"></script>

</body>
</html>
